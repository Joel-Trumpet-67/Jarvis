<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Jarvis</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <section id="app-screen" class="screen">
    <header class="app-header">
      <span id="display-name">Jarvis</span>
      <select id="voice-select" title="Voice"></select>
      <button id="mute-btn" type="button" title="Mute voice output">🔊</button>
      <button id="lists-btn" type="button" title="Notes, tasks, goals, shopping, reminders">📋</button>
    </header>

    <div id="briefing-card" class="briefing-card" hidden></div>

    <main id="chat-log" class="chat-log"></main>

    <section id="lists-panel" class="lists-panel" hidden>
      <div class="lists-tabs">
        <button class="lists-tab" data-type="notes">Notes</button>
        <button class="lists-tab" data-type="tasks">Tasks</button>
        <button class="lists-tab" data-type="goals">Goals</button>
        <button class="lists-tab" data-type="shopping">Shopping</button>
        <button class="lists-tab" data-type="reminders">Reminders</button>
        <button id="lists-close" type="button" title="Close">✕</button>
      </div>
      <form id="lists-add-form">
        <input id="lists-add-input" type="text" placeholder="Add item" autocomplete="off" />
        <button type="submit">Add</button>
      </form>
      <ul id="lists-items"></ul>
    </section>

    <form id="chat-form" class="chat-form">
      <button id="mic-btn" type="button" title="Voice input">🎤</button>
      <input id="chat-input" type="text" placeholder="Ask Jarvis anything" autocomplete="off" />
      <button type="submit">Send</button>
    </form>

    <section id="approval-card" class="approval-card" hidden>
      <h2>Pending tools</h2>
      <div id="approval-list"></div>
    </section>
  </section>

  <script src="/api.js"></script>
  <script src="/voice.js"></script>
  <script src="/app.js"></script>
</body>
</html>
