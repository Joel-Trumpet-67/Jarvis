<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Jarvis</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <section id="login-screen" class="screen">
    <form id="login-form" class="login-card">
      <h1>Jarvis</h1>
      <label for="username">Account</label>
      <select id="username" name="username" required>
        <option value="joel">Joel</option>
        <option value="valerie">Valerie</option>
      </select>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit">Log in</button>
      <p id="login-error" class="error" hidden></p>
    </form>
  </section>

  <section id="app-screen" class="screen" hidden>
    <header class="app-header">
      <span id="display-name">Jarvis</span>
      <button id="logout-btn" type="button">Log out</button>
    </header>

    <main id="chat-log" class="chat-log"></main>

    <form id="chat-form" class="chat-form">
      <button id="mic-btn" type="button" title="Voice input">🎤</button>
      <input id="chat-input" type="text" placeholder="Ask Jarvis anything" autocomplete="off" />
      <button type="submit">Send</button>
    </form>

    <section id="approval-card" class="approval-card" hidden>
      <h2>Pending tools</h2>
      <div id="approval-list"></div>
    </section>
  </section>

  <script src="/api.js"></script>
  <script src="/voice.js"></script>
  <script src="/app.js"></script>
</body>
</html>
