<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Jarvis</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <section id="app-screen" class="screen">
    <header class="app-header">
      <span id="display-name">Jarvis</span>
      <select id="voice-select" title="Voice"></select>
      <button id="mute-btn" type="button" title="Mute voice output">🔊</button>
    </header>

    <main id="chat-log" class="chat-log"></main>

    <form id="chat-form" class="chat-form">
      <button id="mic-btn" type="button" title="Voice input">🎤</button>
      <input id="chat-input" type="text" placeholder="Ask Jarvis anything" autocomplete="off" />
      <button type="submit">Send</button>
    </form>

    <section id="approval-card" class="approval-card" hidden>
      <h2>Pending tools</h2>
      <div id="approval-list"></div>
    </section>
  </section>

  <script src="/api.js"></script>
  <script src="/voice.js"></script>
  <script src="/app.js"></script>
</body>
</html>
